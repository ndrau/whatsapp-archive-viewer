# TrueNAS / Portainer — App-Image + zwei getrennte Datasets
#
# Trennung:
#   1) DATA   — dauerhafte Chat-Rohdaten (Uploads). Überlebt App-Updates immer.
#   2) BUILT  — generierte Index/JSON-Artefakte. Löschbar, App baut neu.
#   3) IMAGE  — nur Programmcode (ghcr.io/…). Enthält keine persönlichen Daten.
#
# TrueNAS-Datasets anlegen (Pfade unten anpassen):
#   /mnt/tank/apps/whatsapp-archive/data
#   /mnt/tank/apps/whatsapp-archive/built
#
# Deploy: Portainer Stack → Passwort setzen → Deploy → http://<nas-ip>:3080

services:
  whatsapp-archive:
    image: ghcr.io/ndrau/whatsapp-archive-viewer:latest
    # Lokal selbst bauen statt pullen:
    # build: .
    # image: whatsapp-archive-viewer:local
    container_name: whatsapp-archive
    restart: unless-stopped
    ports:
      - "3080:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      TZ: Europe/Berlin
      # 1 = beim Start aus DATA neu bauen (empfohlen nach App-Update / neuem Upload)
      # 0 = vorhandene BUILT-Artefakte nutzen (schnellerer Start)
      BUILD_CHATS_ON_START: "1"
      # Login — bitte ändern (Secret: openssl rand -base64 32)
      ARCHIVE_PASSWORD: "CHANGE_ME"
      AUTH_SECRET: "CHANGE_ME_TO_A_LONG_RANDOM_STRING_AT_LEAST_32_CHARS"
      # Max. Upload-Größe in Bytes (Default 8 GB)
      MAX_UPLOAD_BYTES: "8589934592"
    volumes:
      # Dataset DATA — WhatsApp-Exporte / UI-Uploads (schreibbar, persistent)
      - /mnt/tank/apps/whatsapp-archive/data:/app/chats
      # Dataset BUILT — Index, Suche, Upload-Jobs (neu generierbar)
      - /mnt/tank/apps/whatsapp-archive/built:/app/.built
    # TrueNAS: Dataset-Rechte für UID 1001 (nextjs) oder vorübergehend:
    # user: "0:0"
